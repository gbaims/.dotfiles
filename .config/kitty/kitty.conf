# general
enable_audio_bell no
notify_on_cmd_finish unfocused

# window decoration and layout
background_opacity        0.98
hide_window_decorations   yes
window_padding_width      0 5
enabled_layouts           fat:bias=75;full_size=1;mirrored=false,stack

# keyboard shortcuts
map shift+esc             toggle_layout stack
map ctrl+t                new_tab_with_cwd
map ctrl+\                new_window_with_cwd
map ctrl+w                close_window
map ctrl+tab              next_window
map ctrl+q                previous_tab
map ctrl+e                next_tab

# Nerd Fonts v3.2.0 (Fallback)
symbol_map U+e000-U+e00a,U+ea60-U+ebeb,U+e0a0-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b1,U+e700-U+e7c5,U+ed00-U+efc1,U+f000-U+f2ff,U+f000-U+f2e0,U+f300-U+f372,U+f400-U+f533,U+f0001-U+f1af0 Symbols Nerd Font Mono

# local overrides
include kitty.local

# BEGIN_KITTY_THEME
# Rosé Pine
include current-theme.conf
# END_KITTY_THEME

# BEGIN_KITTY_FONTS
font_family      family='JetBrains Mono' style=Regular
bold_font        family='JetBrains Mono' style=SemiBold
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
